<footer class="border-t border-white/[0.06] mt-24">
    <div class="max-w-6xl mx-auto px-5 sm:px-8 py-10">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
            <p class="text-gray-600 text-sm font-mono">
                &copy; {% now "Y" %} {{ site_owner.full_name|default:"Portfolio" }}
                <span class="text-gray-700 mx-1">·</span>
                <span class="text-gray-700">built with Django</span>
            </p>
            <div class="flex items-center gap-5">
                {% if site_owner.github %}
                <a href="{{ site_owner.github }}" target="_blank" rel="noopener" class="text-gray-600 hover:text-emerald-400 transition-colors text-sm font-mono">github</a>
                {% endif %}
                {% if site_owner.linkedin %}
                <a href="{{ site_owner.linkedin }}" target="_blank" rel="noopener" class="text-gray-600 hover:text-emerald-400 transition-colors text-sm font-mono">linkedin</a>
                {% endif %}
                {% if site_owner.telegram %}
                <a href="{{ site_owner.telegram }}" target="_blank" rel="noopener" class="text-gray-600 hover:text-emerald-400 transition-colors text-sm font-mono">telegram</a>
                {% endif %}
                {% if site_owner.gmail %}
                <a href="mailto:{{ site_owner.gmail }}" class="text-gray-600 hover:text-emerald-400 transition-colors text-sm font-mono">email</a>
                {% endif %}
            </div>
        </div>
    </div>
</footer>
