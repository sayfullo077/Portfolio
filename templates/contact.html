{% extends "base.html" %}
{% load static %}

{% block title %}Contact — {{ site_owner.full_name|default:"Portfolio" }}{% endblock %}

{% block content %}
<article class="contact active" data-page="contact">

  <header>
    <h2 class="h2 article-title">Contact</h2>
  </header>

  {% if site_owner.location %}
  <section class="mapbox" data-mapbox>
    <figure>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2996.1!2d69.2401!3d41.2995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38ae8b0cc379e9c3%3A0xa5a9323b4aa5cb98!2sTashkent%2C%20Uzbekistan!5e0!3m2!1sen!2sus!4v1647608789441!5m2!1sen!2sus"
        width="400" height="300" loading="lazy"></iframe>
    </figure>
  </section>
  {% endif %}

  <section class="contact-form">

    <h3 class="h3 form-title">Contact Form</h3>

    <form action="{% url 'contact' %}" method="POST" class="form" data-form>
      {% csrf_token %}

      <div class="input-wrapper">
        <input
          type="text"
          name="name"
          class="form-input"
          placeholder="Full name"
          required
          data-form-input>

        <input
          type="email"
          name="email"
          class="form-input"
          placeholder="Email address"
          required
          data-form-input>
      </div>

      <input
        type="text"
        name="subject"
        class="form-input"
        placeholder="Subject"
        required
        data-form-input
        style="margin-bottom: 16px;">

      <textarea
        name="message"
        class="form-input"
        placeholder="Your Message"
        required
        data-form-input></textarea>

      <button class="form-btn" type="submit" disabled data-form-btn>
        <ion-icon name="paper-plane"></ion-icon>
        <span>Send Message</span>
      </button>

    </form>

  </section>

</article>
{% endblock %}
